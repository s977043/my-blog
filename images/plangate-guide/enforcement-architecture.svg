<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">PlanGate enforcement architecture</title>
  <desc id="desc">Architecture diagram showing C-3 approval, hooks, audit log, V-1, C-4 and CI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1200" height="720" rx="30" fill="url(#bg)"/>
  <text x="70" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="40" font-weight="700" fill="#0f172a">承認された計画を、実装時に守らせる</text>
  <text x="70" y="124" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#475569">PlanGate は「お願い」ではなく、Hook と証跡で不変条件に変える</text>
  <g filter="url(#shadow)">
    <rect x="70" y="180" width="250" height="130" rx="22" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <rect x="475" y="180" width="250" height="130" rx="22" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <rect x="880" y="180" width="250" height="130" rx="22" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <rect x="70" y="455" width="250" height="130" rx="22" fill="#f1f5f9" stroke="#64748b" stroke-width="3"/>
    <rect x="475" y="455" width="250" height="130" rx="22" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
    <rect x="880" y="455" width="250" height="130" rx="22" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
  </g>
  <text x="195" y="230" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700" fill="#1e3a8a">plan.md</text>
  <text x="195" y="265" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#1e40af">スコープ・受入基準</text>
  <text x="600" y="230" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700" fill="#92400e">C-3 approval</text>
  <text x="600" y="265" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#92400e">APPROVED / CONDITIONAL / REJECTED</text>
  <text x="1005" y="230" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700" fill="#166534">Exec</text>
  <text x="1005" y="265" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#166534">AI が実装する</text>
  <text x="195" y="505" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700" fill="#334155">Hooks</text>
  <text x="195" y="540" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#475569">EH-1〜EH-9 / EHS</text>
  <text x="600" y="505" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700" fill="#991b1b">Audit log</text>
  <text x="600" y="540" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#991b1b">VIOLATION / BYPASS を記録</text>
  <text x="1005" y="505" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="27" font-weight="700" fill="#5b21b6">Verify / C-4 / CI</text>
  <text x="1005" y="540" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#6d28d9">証明してマージへ</text>
  <g stroke="#334155" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M320 245 H468"/>
    <path d="M725 245 H873"/>
    <path d="M1005 310 V445"/>
    <path d="M320 520 H473"/>
    <path d="M725 520 H877"/>
    <path d="M195 455 V318"/>
  </g>
  <path d="M1005 326 C870 388 330 388 195 326" stroke="#64748b" stroke-width="3" fill="none" stroke-dasharray="9 9" marker-end="url(#arrow)"/>
  <text x="600" y="382" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#334155">実装直前に Hook が計画・承認・スコープを検査</text>
  <text x="600" y="655" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#64748b">違反を止めるだけでなく、後から説明できる証跡として残す</text>
</svg>
