<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">PlanGate adoption roadmap</title>
  <desc id="desc">Roadmap diagram from Phase 0 to Phase 3 for PlanGate adoption.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfbff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.11"/>
    </filter>
  </defs>
  <rect width="1200" height="660" rx="30" fill="url(#bg)"/>
  <text x="70" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="40" font-weight="700" fill="#0f172a">PlanGate は段階導入する</text>
  <text x="70" y="124" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#475569">いきなり strict にしない。warning で学び、リスクに応じて強制力を上げる。</text>
  <line x1="150" y1="310" x2="1050" y2="310" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/>
  <g filter="url(#shadow)">
    <circle cx="180" cy="310" r="55" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
    <circle cx="470" cy="310" r="55" fill="#fef3c7" stroke="#d97706" stroke-width="4"/>
    <circle cx="760" cy="310" r="55" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
    <circle cx="1050" cy="310" r="55" fill="#ede9fe" stroke="#7c3aed" stroke-width="4"/>
  </g>
  <text x="180" y="301" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#1e3a8a">Phase</text>
  <text x="180" y="333" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="800" fill="#1e3a8a">0</text>
  <text x="470" y="301" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#92400e">Phase</text>
  <text x="470" y="333" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="800" fill="#92400e">1</text>
  <text x="760" y="301" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#166534">Phase</text>
  <text x="760" y="333" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="800" fill="#166534">2</text>
  <text x="1050" y="301" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#5b21b6">Phase</text>
  <text x="1050" y="333" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="800" fill="#5b21b6">3</text>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="180" y="430" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Day 1</text>
    <text x="180" y="466" text-anchor="middle" font-size="18" fill="#475569">まず体験</text>
    <text x="180" y="494" text-anchor="middle" font-size="18" fill="#475569">ultra-light</text>
    <text x="180" y="522" text-anchor="middle" font-size="18" fill="#475569">ゲートなし</text>

    <text x="470" y="430" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Week 1</text>
    <text x="470" y="466" text-anchor="middle" font-size="18" fill="#475569">計画を書く</text>
    <text x="470" y="494" text-anchor="middle" font-size="18" fill="#475569">light</text>
    <text x="470" y="522" text-anchor="middle" font-size="18" fill="#475569">C-1 簡易</text>

    <text x="760" y="430" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Week 2–3</text>
    <text x="760" y="466" text-anchor="middle" font-size="18" fill="#475569">ゲートで止める</text>
    <text x="760" y="494" text-anchor="middle" font-size="18" fill="#475569">standard</text>
    <text x="760" y="522" text-anchor="middle" font-size="18" fill="#475569">C-1 + C-3</text>

    <text x="1050" y="430" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Month 1+</text>
    <text x="1050" y="466" text-anchor="middle" font-size="18" fill="#475569">フル運用</text>
    <text x="1050" y="494" text-anchor="middle" font-size="18" fill="#475569">standard + strict</text>
    <text x="1050" y="522" text-anchor="middle" font-size="18" fill="#475569">C-1〜C-4 + V-3</text>
  </g>
  <rect x="245" y="185" width="710" height="54" rx="27" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="600" y="220" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#334155">warning → partial strict → strict</text>
  <text x="600" y="600" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#64748b">強制力は、チームの習熟度とタスクのリスクに比例させる</text>
</svg>
