name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  content:
    name: Content checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          # check:zenn-pace が過去 24h の commit を走査するため全履歴を取得する
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Check Zenn content
        run: npm run check

      # release/zenn 宛 PR のみ: 公開ペース(実効 24h/1本)を強制ゲート化する。
      # 通常の npm run check では zenn-pace は非ブロッキング(件数表示のみ)。
      # release/zenn への merge が実 deploy=rate-limit 消費なので、ここで STRICT=1 で fatal 化する。
      - name: Zenn publish pace gate (release/zenn PRs only)
        if: github.event_name == 'pull_request' && github.base_ref == 'release/zenn'
        run: STRICT=1 npm run check:zenn-pace

      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: high
