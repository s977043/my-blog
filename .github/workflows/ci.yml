name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  content:
    name: Content checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3
        with:
          # check:zenn-pace が過去 24h の commit を走査するため全履歴を取得する
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Check Zenn content
        run: npm run check

      # release/zenn 宛 PR のみ: この PR が release/zenn に新規に持ち込む published 数を
      # diff モード(BASE_REF)で直接計測し、二重公開(同一 deploy/24h で 2 記事)を STRICT で fatal 化する。
      # date モード(コミット日付)は「溜めてから sync」運用で見逃す/誤ブロックするため base 比較で計測する。
      - name: Zenn publish pace gate (release/zenn PRs only)
        if: github.event_name == 'pull_request' && github.base_ref == 'release/zenn'
        run: |
          git fetch origin "${{ github.base_ref }}"
          STRICT=1 BASE_REF="origin/${{ github.base_ref }}" npm run check:zenn-pace

      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: high
