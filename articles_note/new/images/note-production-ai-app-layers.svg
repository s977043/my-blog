<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title">
<title id="title">AIアプリの責務分離レイヤー</title>
<style>
.t{font-family:'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif;fill:#0f172a}
.h{font-size:38px;font-weight:800}
.layer{font-size:22px;font-weight:800}
.dir{font-size:19px;font-weight:700;fill:#0f766e}
.desc{font-size:18px;fill:#475569}
.tag{font-size:16px;font-weight:700}
</style>
<rect width="1200" height="630" rx="32" fill="#f8fafc"/>
<text class="t h" x="600" y="62" text-anchor="middle">AIアプリは「LLMを呼ぶコード」ではなく責務分離された本番システム</text>

<!-- Layer bars: left label + right description -->
<!-- L1: 入口 -->
<rect x="42" y="88" width="1116" height="72" rx="14" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5"/>
<text class="t layer" x="160" y="132" text-anchor="middle" fill="#075985">入口層</text>
<text class="t dir" x="300" y="132">app/</text>
<text class="t desc" x="420" y="132">APIルーティング・設定・スキーマ定義・Dockerfile</text>
<text class="t tag" x="1090" y="132" text-anchor="end" fill="#075985">Web基盤</text>

<!-- L2: 検索・制御 -->
<rect x="42" y="172" width="1116" height="72" rx="14" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
<text class="t layer" x="160" y="216" text-anchor="middle" fill="#166534">検索・制御層</text>
<text class="t dir" x="300" y="216">components/ services/</text>
<text class="t desc" x="560" y="216">hybrid retrieval・reranker・RAGパイプライン・クエリ書き換え・ルーティング・キャッシュ</text>
<text class="t tag" x="1090" y="216" text-anchor="end" fill="#166534">品質の要</text>

<!-- L3: AI処理 -->
<rect x="42" y="256" width="1116" height="72" rx="14" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
<text class="t layer" x="160" y="300" text-anchor="middle" fill="#7e22ce">AI処理層</text>
<text class="t dir" x="300" y="300">prompts/ agents/</text>
<text class="t desc" x="520" y="300">プロンプト管理（バージョン管理・用途別）・文書評価・クエリ分解・適応的ルーティング</text>
<text class="t tag" x="1090" y="300" text-anchor="end" fill="#7e22ce">柔軟な判断</text>

<!-- L4: 安全 -->
<rect x="42" y="340" width="1116" height="72" rx="14" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
<text class="t layer" x="160" y="384" text-anchor="middle" fill="#9a3412">安全層</text>
<text class="t dir" x="300" y="384">security/</text>
<text class="t desc" x="420" y="384">入力ガード（インジェクション検知）・参照コンテンツスクリーニング・出力ガード（PII・ポリシー）</text>
<text class="t tag" x="1090" y="384" text-anchor="end" fill="#9a3412">必須・後回し禁止</text>

<!-- L5: 品質評価 -->
<rect x="42" y="424" width="548" height="72" rx="14" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
<text class="t layer" x="160" y="468" text-anchor="middle" fill="#991b1b">品質評価層</text>
<text class="t dir" x="300" y="468">evaluation/</text>
<text class="t desc" x="420" y="468">ゴールデンデータセット・変更前後の比較・本番モニタリング</text>

<!-- L6: 観測 -->
<rect x="610" y="424" width="548" height="72" rx="14" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1.5"/>
<text class="t layer" x="760" y="468" text-anchor="middle" fill="#075985">観測層</text>
<text class="t dir" x="900" y="468">observability/</text>
<text class="t desc" x="1040" y="468">トレース・フィードバック・コスト追跡</text>

<!-- Bottom bar -->
<rect x="42" y="516" width="1116" height="72" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
<text class="t layer" x="160" y="560" text-anchor="middle" fill="#475569">支援層</text>
<text class="t dir" x="300" y="560">tests/ docs/ data/</text>
<text class="t desc" x="460" y="560">テスト・ドキュメント・インデックス構築・データ整備</text>
</svg>
