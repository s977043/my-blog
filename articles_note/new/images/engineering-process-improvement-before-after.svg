<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc"><title id="title">振り返りのBefore After</title><desc id="desc">気をつけようで終わる振り返りと、仕組みに変える振り返りの対比</desc><style>.t{font-family:'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif;fill:#0f172a}.h{font-size:42px;font-weight:800}.b{font-size:32px;font-weight:800}.s{font-size:26px}.m{fill:#475569}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2}.bad{fill:#fef2f2;stroke:#fecaca}.good{fill:#ecfdf5;stroke:#99f6e4}.arrow{stroke:#0f766e;stroke-width:5;fill:none;marker-end:url(#a)}</style><defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#0f766e"/></marker></defs><rect width="1200" height="630" rx="32" fill="#f8fafc"/><text class="t h" x="600" y="78" text-anchor="middle">反省会から、仕組みを積む時間へ</text><g transform="translate(90 145)"><rect class="box bad" width="430" height="360" rx="28"/><text class="t b" x="215" y="70" text-anchor="middle">Before</text><text class="t s m" x="215" y="140" text-anchor="middle">感想で終わる</text><text class="t s m" x="215" y="190" text-anchor="middle">次は気をつける</text><text class="t s m" x="215" y="240" text-anchor="middle">同じ失敗が再発する</text><text class="t s m" x="215" y="290" text-anchor="middle">知識が属人化する</text></g><path class="arrow" d="M545 325 H655"/><g transform="translate(680 145)"><rect class="box good" width="430" height="360" rx="28"/><text class="t b" x="215" y="70" text-anchor="middle">After</text><text class="t s m" x="215" y="140" text-anchor="middle">PRとして履歴に残る</text><text class="t s m" x="215" y="190" text-anchor="middle">自動ガードで止まる</text><text class="t s m" x="215" y="240" text-anchor="middle">次回の失敗率が下がる</text><text class="t s m" x="215" y="290" text-anchor="middle">チームの資産になる</text></g></svg>