<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title">
<title id="title">「次は気をつけよう」で終わる振り返りを仕組みに変える</title>
<style>
.t{font-family:'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif;fill:#0f172a}
.h{font-size:42px;font-weight:800}
.sub{font-size:22px;font-weight:600;fill:#475569}
.cycle-h{font-size:26px;font-weight:800}
.cycle-b{font-size:18px}
.label-x{font-size:20px;font-weight:700}
.note{font-size:17px;fill:#64748b}
</style>
<rect width="1200" height="630" rx="32" fill="#f8fafc"/>

<!-- Title -->
<text class="t h" x="600" y="84" text-anchor="middle">「次は気をつけよう」で終わる振り返りを</text>
<text class="t h" x="600" y="134" text-anchor="middle">仕組みに変える</text>

<!-- Left: 反省どまり -->
<rect x="80" y="200" width="430" height="320" rx="20" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
<rect x="80" y="200" width="430" height="68" rx="20" fill="#dc2626"/>
<rect x="80" y="240" width="430" height="28" fill="#dc2626"/>
<text class="t cycle-h" x="295" y="246" text-anchor="middle" fill="#fff">反省どまり</text>
<text class="t" x="295" y="298" text-anchor="middle" fill="#7f1d1d" font-size="20" font-weight="700">「次は気をつけよう」</text>
<text class="t cycle-b" x="295" y="338" text-anchor="middle" fill="#991b1b">→ 個人の意識に依存</text>
<text class="t cycle-b" x="295" y="370" text-anchor="middle" fill="#991b1b">→ 担当者が変わると消える</text>
<text class="t cycle-b" x="295" y="402" text-anchor="middle" fill="#991b1b">→ 同じミスがまた起きる</text>

<rect x="115" y="430" width="360" height="60" rx="12" fill="#fee2e2"/>
<text class="t" x="295" y="455" text-anchor="middle" font-size="17" fill="#7f1d1d" font-weight="700">気合と記憶力に頼る運用</text>
<text class="t" x="295" y="478" text-anchor="middle" font-size="15" fill="#991b1b">→ 再発防止になっていない</text>

<!-- Arrow -->
<text x="600" y="358" text-anchor="middle" font-size="56" fill="#0f766e">→</text>
<text class="t label-x" x="600" y="402" text-anchor="middle" fill="#0f766e">仕組み化</text>

<!-- Right: 仕組み化 -->
<rect x="690" y="200" width="430" height="320" rx="20" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
<rect x="690" y="200" width="430" height="68" rx="20" fill="#059669"/>
<rect x="690" y="240" width="430" height="28" fill="#059669"/>
<text class="t cycle-h" x="905" y="246" text-anchor="middle" fill="#fff">仕組み化</text>
<text class="t" x="905" y="298" text-anchor="middle" fill="#065f46" font-size="20" font-weight="700">3つの出口に振り分ける</text>
<text class="t cycle-b" x="905" y="338" text-anchor="middle" fill="#065f46">① ドキュメント／規約に明文化</text>
<text class="t cycle-b" x="905" y="370" text-anchor="middle" fill="#065f46">② lint・CI で機械的に止める</text>
<text class="t cycle-b" x="905" y="402" text-anchor="middle" fill="#065f46">③ チェックリスト／プロセスに組込</text>

<rect x="725" y="430" width="360" height="60" rx="12" fill="#d1fae5"/>
<text class="t" x="905" y="455" text-anchor="middle" font-size="17" fill="#065f46" font-weight="700">担当者が変わっても再発しない</text>
<text class="t" x="905" y="478" text-anchor="middle" font-size="15" fill="#047857">→ チームの資産として蓄積</text>

<!-- Bottom note -->
<text class="t note" x="600" y="585" text-anchor="middle">— 振り返りの粒度・出口・軽量モードの使い分けで、仕組みは続く —</text>
</svg>
