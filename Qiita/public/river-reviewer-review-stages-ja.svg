<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">River Reviewer が開発の流れ全体をレビューする図</title>
  <desc id="desc">上流、中流、下流の3段階をAIレビューが横断することを示す図</desc>
  <defs>
    <linearGradient id="river" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#2f8ac8"/>
      <stop offset="0.52" stop-color="#1f9aa0"/>
      <stop offset="1" stop-color="#77a95b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="#fbfcfd"/>
  <text x="800" y="78" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',Meiryo,sans-serif" font-size="46" font-weight="800" fill="#142033">PR差分だけでなく、開発の流れ全体をレビューする</text>
  <text x="800" y="125" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',Meiryo,sans-serif" font-size="24" fill="#475569">River Reviewer は上流・中流・下流の文脈を分断せずに扱う</text>

  <g font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',Meiryo,sans-serif" filter="url(#shadow)">
    <rect x="70" y="180" width="420" height="230" rx="24" fill="#eef8ff" stroke="#2f8ac8" stroke-width="3"/>
    <rect x="90" y="202" width="380" height="60" rx="18" fill="#0f78b7"/>
    <text x="280" y="243" text-anchor="middle" font-size="34" font-weight="800" fill="#fff">上流</text>
    <text x="280" y="294" text-anchor="middle" font-size="22" fill="#334155">要件・設計・計画を見る</text>
    <g fill="#fff" stroke="#0f78b7" stroke-width="3">
      <rect x="103" y="322" width="96" height="54" rx="14"/>
      <rect x="232" y="322" width="96" height="54" rx="14"/>
      <rect x="361" y="322" width="96" height="54" rx="14"/>
    </g>
    <text x="151" y="357" text-anchor="middle" font-size="22" font-weight="700" fill="#0f3554">要件</text>
    <text x="280" y="357" text-anchor="middle" font-size="22" font-weight="700" fill="#0f3554">設計</text>
    <text x="409" y="357" text-anchor="middle" font-size="22" font-weight="700" fill="#0f3554">計画</text>

    <rect x="590" y="180" width="420" height="230" rx="24" fill="#eefdfb" stroke="#1f9aa0" stroke-width="3"/>
    <rect x="610" y="202" width="380" height="60" rx="18" fill="#148c8f"/>
    <text x="800" y="243" text-anchor="middle" font-size="34" font-weight="800" fill="#fff">中流</text>
    <text x="800" y="294" text-anchor="middle" font-size="22" fill="#334155">実装・PR・コード変更を見る</text>
    <g fill="#fff" stroke="#148c8f" stroke-width="3">
      <rect x="623" y="322" width="96" height="54" rx="14"/>
      <rect x="752" y="322" width="96" height="54" rx="14"/>
      <rect x="881" y="322" width="96" height="54" rx="14"/>
    </g>
    <text x="671" y="357" text-anchor="middle" font-size="22" font-weight="700" fill="#0f3f43">差分</text>
    <text x="800" y="357" text-anchor="middle" font-size="22" font-weight="700" fill="#0f3f43">PR</text>
    <text x="929" y="357" text-anchor="middle" font-size="22" font-weight="700" fill="#0f3f43">コード</text>

    <rect x="1110" y="180" width="420" height="230" rx="24" fill="#f3faee" stroke="#77a95b" stroke-width="3"/>
    <rect x="1130" y="202" width="380" height="60" rx="18" fill="#679a49"/>
    <text x="1320" y="243" text-anchor="middle" font-size="34" font-weight="800" fill="#fff">下流</text>
    <text x="1320" y="294" text-anchor="middle" font-size="22" fill="#334155">テスト・QA・運用を見る</text>
    <g fill="#fff" stroke="#679a49" stroke-width="3">
      <rect x="1143" y="322" width="96" height="54" rx="14"/>
      <rect x="1272" y="322" width="96" height="54" rx="14"/>
      <rect x="1401" y="322" width="96" height="54" rx="14"/>
    </g>
    <text x="1191" y="357" text-anchor="middle" font-size="22" font-weight="700" fill="#2f4f25">テスト</text>
    <text x="1320" y="357" text-anchor="middle" font-size="22" font-weight="700" fill="#2f4f25">QA</text>
    <text x="1449" y="357" text-anchor="middle" font-size="22" font-weight="700" fill="#2f4f25">運用</text>
  </g>

  <path d="M70 535 C245 475, 350 610, 535 545 S875 475, 1060 545 S1370 615, 1530 535" fill="none" stroke="url(#river)" stroke-width="60" stroke-linecap="round" opacity="0.78"/>
  <path d="M85 536 C255 490, 355 590, 535 548 S875 490, 1055 548 S1370 595, 1515 536" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.75"/>

  <g font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',Meiryo,sans-serif">
    <rect x="70" y="665" width="1460" height="140" rx="26" fill="#fff8eb" stroke="#d97706" stroke-width="3"/>
    <rect x="655" y="632" width="290" height="64" rx="20" fill="#d97706"/>
    <text x="800" y="674" text-anchor="middle" font-size="32" font-weight="800" fill="#fff">AIレビュー</text>
    <path d="M135 735 H1465" stroke="#d97706" stroke-width="8" stroke-linecap="round" stroke-dasharray="18 18"/>
    <path d="M1465 735 l-28 -18 v36 z" fill="#d97706"/>
    <text x="210" y="772" text-anchor="middle" font-size="21" fill="#334155">目的との整合</text>
    <text x="430" y="772" text-anchor="middle" font-size="21" fill="#334155">不要な変更の検出</text>
    <text x="650" y="772" text-anchor="middle" font-size="21" fill="#334155">設計方針の確認</text>
    <text x="870" y="772" text-anchor="middle" font-size="21" fill="#334155">コード品質と安全性</text>
    <text x="1110" y="772" text-anchor="middle" font-size="21" fill="#334155">テスト観点の確認</text>
    <text x="1350" y="772" text-anchor="middle" font-size="21" fill="#334155">運用リスクの確認</text>
  </g>
</svg>
