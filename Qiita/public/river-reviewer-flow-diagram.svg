  <text x="600" y="390" font-family="Noto Sans JP, sans-serif" font-size="20" text-anchor="middle" fill="#374151">実装・PR</text>

  <circle cx="950" cy="280" r="78" fill="#fff7ed" stroke="#ea580c" stroke-width="4"/>
  <text x="950" y="270" font-family="Noto Sans JP, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#c2410c">Downstream</text>
  <text x="950" y="305" font-family="Noto Sans JP, sans-serif" font-size="20" text-anchor="middle" fill="#374151">テスト・運用</text>

  <text x="600" y="585" font-family="Noto Sans JP, sans-serif" font-size="24" text-anchor="middle" fill="#111827">Review that Flows With You.</text>
