<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#ffffff"/>
  <text x="600" y="80" font-family="Noto Sans JP, sans-serif" font-size="40" text-anchor="middle" fill="#111827">River Reviewer</text>
  <text x="600" y="125" font-family="Noto Sans JP, sans-serif" font-size="22" text-anchor="middle" fill="#4b5563">開発の流れ全体をレビューする AI フレームワーク</text>

  <path d="M 100 500 C 250 430, 350 470, 500 400 C 650 330, 750 370, 900 300 C 1000 255, 1080 245, 1140 230"
        fill="none" stroke="#3b82f6" stroke-width="36" stroke-linecap="round" opacity="0.9"/>

  <circle cx="250" cy="455" r="78" fill="#eff6ff" stroke="#2563eb" stroke-width="4"/>
  <text x="250" y="445" font-family="Noto Sans JP, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#1d4ed8">Upstream</text>
  <text x="250" y="480" font-family="Noto Sans JP, sans-serif" font-size="20" text-anchor="middle" fill="#374151">要件・設計</text>

  <circle cx="600" cy="365" r="78" fill="#f0fdf4" stroke="#16a34a" stroke-width="4"/>
